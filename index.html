<body>

    <div class="history-sidebar">
        <h2 style="margin: 0;">Session History</h2>
        <div class="history-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Country</th>
                        <th>Guess</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
        <div class="table-summary">
            <span>Rounds: <span id="totalPlayed">0</span></span>
            <span>Accuracy: <span id="accuracy">0</span>%</span>
        </div>
    </div>

    <div class="main-quiz">
        <div class="card">
            <div class="stats">
                <div>Score: <span id="score">0</span></div>
                <div>Best: <span id="highScore">0</span></div>
            </div>
            
            <div class="flag-display">
                <img id="flagImg" src="" alt="Flag" style="display:none;">
            </div>

            <div id="question" class="question-text">Ready to test your Eurovision knowledge?</div>
            
            <input type="number" id="answerInput" placeholder="?" min="1">
            <button id="submitBtn">Start Quiz</button> 
            <div id="feedback"></div>
        </div>
    </div>

<script>
    // IP updated to your server
    const API_URL = "http://144.24.171.177/api/question"; 

    let score = 0;
    let totalRounds = 0;
    let highScore = localStorage.getItem('esc_highscore') || 0;
    let currentItem = {};
    let attempts = 0;
    let gameStarted = false;

    // ... (Keep the same playSound and speak functions from the previous version) ...

    const elements = {
        question: document.getElementById('question'),
        flagImg: document.getElementById('flagImg'),
        input: document.getElementById('answerInput'),
        score: document.getElementById('score'),
        highScore: document.getElementById('highScore'),
        feedback: document.getElementById('feedback'),
        history: document.getElementById('historyBody'),
        btn: document.getElementById('submitBtn'),
        totalPlayed: document.getElementById('totalPlayed'),
        accuracy: document.getElementById('accuracy')
    };

    elements.highScore.textContent = highScore;

    async function nextQuestion() {
        attempts = 0;
        elements.question.textContent = "Fetching next question...";
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            currentItem = {
                y: data.year,
                x: data.country_name,
                code: data.country_code.toLowerCase(),
                pos: data.rank
            };

            elements.flagImg.src = `https://flagcdn.com/w160/${currentItem.code}.png`;
            elements.flagImg.style.display = 'inline-block';
            
            const qText = `In which position did ${currentItem.x} finish in the ${currentItem.y} final?`;
            elements.question.textContent = qText;
            speak(qText);

            elements.input.value = '';
            elements.feedback.textContent = '';
            elements.input.focus();
        } catch (error) {
            elements.question.textContent = "Error connecting to server. Make sure your PM2 process is running!";
            console.error(error);
        }
    }

    function checkAnswer() {
        // Logical fix for the "Start" state
        if(!gameStarted) {
            gameStarted = true;
            elements.btn.textContent = "Submit Answer"; // Change button text
            nextQuestion();
            return;
        }

        const guess = parseInt(elements.input.value);
        if (isNaN(guess)) return;

        if (guess === currentItem.pos) {
            score++;
            elements.score.textContent = score;
            elements.feedback.style.color = 'var(--success)';
            elements.feedback.textContent = "Correct! ✨";
            playSound('success');
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('esc_highscore', highScore);
                elements.highScore.textContent = highScore;
            }
            addToTable(currentItem.x, currentItem.code, currentItem.y, guess, currentItem.pos, true);
            setTimeout(nextQuestion, 1500);
        } else {
            attempts++;
            if (attempts === 1) {
                elements.feedback.style.color = 'var(--warning)';
                elements.feedback.textContent = "Not quite. One more try!";
                playSound('try-again');
                elements.input.value = '';
                elements.input.focus();
            } else {
                elements.feedback.style.color = 'var(--error)';
                elements.feedback.textContent = `Incorrect. The answer was ${currentItem.pos}.`;
                playSound('error');
                addToTable(currentItem.x, currentItem.code, currentItem.y, guess, currentItem.pos, false);
                setTimeout(nextQuestion, 2500);
            }
        }
    }

    function addToTable(country, code, year, guess, actual, isCorrect) {
        totalRounds++;
        const row = document.createElement('tr');
        row.className = isCorrect ? 'row-correct' : 'row-wrong';
        const flagThumb = `https://flagcdn.com/w40/${code}.png`;
        
        row.innerHTML = `
            <td><img src="${flagThumb}" width="25" style="border-radius:2px; vertical-align:middle; margin-right:8px;"> ${country} (${year})</td>
            <td>${guess}</td>
            <td>${isCorrect ? '✔' : '✘ (Ans: ' + actual + ')'}</td>
        `;
        elements.history.prepend(row);
        updateSummary();
    }

    function updateSummary() {
        elements.totalPlayed.textContent = totalRounds;
        const acc = totalRounds === 0 ? 0 : Math.round((score / totalRounds) * 100);
        elements.accuracy.textContent = acc;
    }

    elements.btn.onclick = checkAnswer;
    elements.input.onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(); };

</script>
</body>
